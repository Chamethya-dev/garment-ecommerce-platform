{% extends "base.html" %}
{% block title %}Admin Dashboard{% endblock %}
{% block content %}
<h2>Admin Dashboard</h2>
<div class="row mt-4">
    <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5 class="card-title">Total Products</h5>
                <p class="card-text display-6">{{ total_products }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5 class="card-title">Categories</h5>
                <p class="card-text display-6">{{ total_categories }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-danger mb-3">
            <div class="card-body">
                <h5 class="card-title">Low Stock Alerts</h5>
                <p class="card-text display-6">{{ low_stock_variants }}</p>
            </div>
        </div>
    </div>
</div>
<div class="mt-4">
    <a href="{{ url_for('admin.products') }}" class="btn btn-dark">Manage Products</a>
    <a href="{{ url_for('admin.add_product') }}" class="btn btn-primary">Add New Product</a>
</div>
{% endblock %}
