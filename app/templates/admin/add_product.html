{% extends "base.html" %}
{% block title %}Add Product{% endblock %}
{% block content %}
<h2>Add New Product</h2>
<div class="row">
    <div class="col-md-8">
        <form method="POST" action="{{ url_for('admin.add_product') }}" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Regular Price (Rs.)</label>
                    <input type="number" step="0.01" name="regular_price" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Sale Price (Rs.) - Optional</label>
                    <input type="number" step="0.01" name="sale_price" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category_id" class="form-select" required>
                    <option value="">Select Category</option>
                    {% for cat in categories %}
                        <option value="{{ cat.category_id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Product Image</label>
                <input type="file" name="image" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-success">Save Product</button>
        </form>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Quick Add Category</div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin.add_category') }}">
                    <input type="text" name="name" class="form-control mb-2" placeholder="Category Name" required>
                    <button type="submit" class="btn btn-secondary w-100">Add Category</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
